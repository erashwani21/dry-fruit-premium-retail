<div class="qr-panel">
  <h2><i class="fas fa-qrcode"></i> Seller QR Code</h2>
  <div class="instruction">
    <i class="fas fa-mobile-alt"></i> Share this QR with buyers. When scanned,
    it opens the order page.
  </div>
  <div id="qrcode"></div>
  <button class="download-btn" id="downloadQRBtn">
    <i class="fas fa-download"></i> Download QR Code (PNG)
  </button>
  <div class="qr-url-info">
    <i class="fas fa-link"></i> <span id="qrUrlDisplay"></span>
  </div>
  <p style="margin-top: 20px; font-size: 0.8rem; color: #a18764">
    <i class="fas fa-info-circle"></i> The QR redirects to the integrated order
    form below. Works on any smartphone.
  </p>
</div>
